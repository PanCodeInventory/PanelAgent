# =============================================================================
# PanelAgent Gateway - Nginx Reverse Proxy
# =============================================================================
# Routes:
#   /admin/api/v1/*  -> admin-frontend:3001 (admin app proxies to backend)
#   /admin/*         -> admin-frontend:3001 (strip /admin prefix)
#   /api/v1/*        -> frontend:3000       (user app proxies to backend)
#   /*               -> frontend:3000       (user-facing pages)
#
# Ports:
#   Gateway:         8080
#   User frontend:   3000
#   Admin frontend:  3001
#   Backend:         8000
# =============================================================================

upstream user_frontend {
    server frontend:3000;
}

upstream admin_frontend {
    server admin-frontend:3001;
}

server {
    listen 80;
    server_name _;

    # ── Admin API routes ──────────────────────────────────────────────────
    # /admin/api/v1/* -> admin-frontend:3001 (Next.js rewrites handle backend proxy)
    location /admin/api/v1/ {
        proxy_pass http://admin_frontend/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Admin Next.js assets ──────────────────────────────────────────────
    # /admin/_next/* -> admin-frontend:3001/_next/*
    location /admin/_next/ {
        proxy_pass http://admin_frontend/_next/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Admin pages ───────────────────────────────────────────────────────
    # /admin/* -> admin-frontend:3001/* (strip /admin prefix)
    # The admin Next.js app sees paths without /admin (e.g. /login, /settings)
    location /admin/ {
        proxy_pass http://admin_frontend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Exact /admin redirect to /admin/ (trailing slash)
    location = /admin {
        return 302 /admin/;
    }

    # ── User API routes ───────────────────────────────────────────────────
    # /api/v1/* -> frontend:3000 (Next.js rewrites handle backend proxy)
    location /api/v1/ {
        proxy_pass http://user_frontend/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── User pages (catch-all) ────────────────────────────────────────────
    location / {
        proxy_pass http://user_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Support WebSocket for Next.js HMR in development
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
