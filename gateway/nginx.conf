# =============================================================================
# PanelAgent Gateway - Nginx Reverse Proxy
# =============================================================================
# The admin-frontend app has been merged into frontend/. All pages (home,
# panel-design, settings, history, quality-registry) are served by a single
# Next.js app.
#
# Routes:
#   /api/v1/*  -> frontend:3000  (Next.js rewrites handle backend proxy)
#   /*         -> frontend:3000  (all pages and assets)
#
# Ports:
#   Gateway:   8080
#   Frontend:  3000
#   Backend:   8000
# =============================================================================

upstream frontend {
    server frontend:3000;
}

server {
    listen 80;
    server_name _;

    # ── API routes ────────────────────────────────────────────────────────
    # /api/v1/* -> frontend:3000 (Next.js rewrites handle backend proxy)
    location /api/v1/ {
        proxy_pass http://frontend/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Pages and assets (catch-all) ──────────────────────────────────────
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Support WebSocket for Next.js HMR in development
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
