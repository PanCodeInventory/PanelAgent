# =============================================================================
# PanelAgent - Docker Compose Stack
# =============================================================================
# Ports: user frontend 3000, admin frontend 3001, backend 8000, gateway 8080
#
# Usage:
#   docker compose build           # build images
#   docker compose up -d           # start stack
#   docker compose ps              # check status
#   docker compose logs -f         # stream logs
#   docker compose down            # tear down
#   docker compose up gateway -d   # start gateway only (depends on all)
# =============================================================================

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: panelagent-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      ADMIN_PASSWORD: "123456"
      ADMIN_SESSION_SECRET: "panelagent-docker-session-secret-2024"
      BACKEND_CORS_ORIGINS: "http://localhost:3000,http://localhost:3001,http://localhost:8080,http://192.168.1.100:3000,http://192.168.1.105:3000"
    volumes:
      - ./data/quality_registry:/app/data/quality_registry
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: panelagent-frontend
    ports:
      - "3000:3000"
    environment:
      BACKEND_INTERNAL_URL: "http://backend:8000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  admin-frontend:
    build:
      context: ./admin-frontend
      dockerfile: ../Dockerfile.frontend
    container_name: panelagent-admin-frontend
    ports:
      - "3001:3000"
    environment:
      BACKEND_INTERNAL_URL: "http://backend:8000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  gateway:
    image: nginx:alpine
    container_name: panelagent-gateway
    ports:
      - "8080:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      admin-frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
